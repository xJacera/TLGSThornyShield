name: ThornedShields
version: '${version}'
main: com.thornedshields.paper.ThornedShieldsPlugin
api-version: '26.2'
author: Reliable Steel Erectors
description: Allows the Thorns enchantment to work on Shields (Paper port of ales' Thorned Shields).
commands:
  thornshield:
    description: Give a limited-edition Thorned Shield to a player.
    usage: /thornshield give <player> [level 1-3]
    permission: thornedshields.give
permissions:
  thornedshields.give:
    description: Allows giving out the limited-edition Thorned Shield.
    default: op
