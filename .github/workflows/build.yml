name: Build ThornedShields Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (runs Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build plugin jar
        id: build
        run: gradle build --no-daemon 2>&1 | tee build_output.log
        continue-on-error: true

      - name: Diagnostic listing
        if: always()
        run: |
          echo "=== build/libs contents ===" >> build_output.log
          find build -maxdepth 3 -type f >> build_output.log 2>&1 || echo "no build dir" >> build_output.log

      - name: Report build log as commit comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 build_output.log > trimmed_output.log
          python3 -c "import json; content=open('trimmed_output.log').read(); print(json.dumps({'body': '### Build log (outcome: ${{ steps.build.outcome }})\n\`\`\`\n' + content + '\n\`\`\`'}))" > payload.json
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload built jar
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: thorned-shields-jar
          path: build/libs/*.jar

      - name: Publish jar as a GitHub Release asset
        if: steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          JAR_PATH=$(ls build/libs/*-all.jar | head -n1)
          JAR_NAME=$(basename "$JAR_PATH")
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Automated build\"}" > release.json
          UPLOAD_URL=$(python3 -c "import json; print(json.load(open('release.json'))['upload_url'].split('{')[0])")
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/java-archive" \
            --data-binary @"$JAR_PATH" \
            "$UPLOAD_URL?name=$JAR_NAME" > asset.json
          cat asset.json
