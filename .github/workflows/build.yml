name: Build ThornedShields Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (runs Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build plugin jar
        id: build
        run: gradle build --no-daemon 2>&1 | tee build_output.log
        continue-on-error: true

      - name: Diagnostic listing
        if: always()
        run: |
          echo "=== build/libs contents ===" >> build_output.log
          find build -maxdepth 3 -type f >> build_output.log 2>&1 || echo "no build dir" >> build_output.log

      - name: Report build log as commit comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 build_output.log > trimmed_output.log
          python3 -c "import json; content=open('trimmed_output.log').read(); print(json.dumps({'body': '### Build log (outcome: ${{ steps.build.outcome }})\n\`\`\`\n' + content + '\n\`\`\`'}))" > payload.json
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload built jar
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: thorned-shields-jar
          path: build/libs/*.jar

      - name: Commit jar into repo for direct download
        id: commitjar
        if: steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          {
            mkdir -p dist
            cp build/libs/*-all.jar dist/thorned-shields-1.0.0-all.jar
            git config user.email "actions@github.com"
            git config user.name "github-actions"
            git add -f dist/thorned-shields-1.0.0-all.jar
            git commit -m "Add built jar [skip ci]" || echo "nothing to commit"
            git pull --rebase "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "${{ github.ref_name }}" || echo "rebase failed or nothing to rebase"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
          } > commitjar_output.log 2>&1
          cat commitjar_output.log

      - name: Report commit-jar step log as commit comment
        if: always() && steps.commitjar.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 commitjar_output.log > trimmed_commitjar.log
          python3 -c "import json; content=open('trimmed_commitjar.log').read(); print(json.dumps({'body': '### Commit-jar step log (outcome: ${{ steps.commitjar.outcome }})\n\`\`\`\n' + content + '\n\`\`\`'}))" > payload2.json
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload2.json
