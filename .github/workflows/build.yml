name: Build ThornedShields Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build plugin jar
        id: build
        run: gradle build --no-daemon 2>&1 | tee build_output.log
        continue-on-error: true

      - name: Report failure as commit comment
        if: steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tail -c 60000 build_output.log > trimmed_output.log
          python3 -c "import json; content=open('trimmed_output.log').read(); print(json.dumps({'body': '### Build failed\n\`\`\`\n' + content + '\n\`\`\`'}))" > payload.json
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d @payload.json

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: thorned-shields-jar
          path: build/libs/*.jar
